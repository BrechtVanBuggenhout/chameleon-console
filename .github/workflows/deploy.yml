name: CD - Console Deployment

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

env:
  REGION: us-central1
  IMAGE_NAME: console

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify deployment variables
        run: |
          test -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" || (echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER" && exit 1)
          test -n "${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}" || (echo "Missing GCP_DEPLOY_SERVICE_ACCOUNT" && exit 1)
          test -n "${{ vars.CONSOLE_ARTIFACT_REPOSITORY_URL }}" || (echo "Missing CONSOLE_ARTIFACT_REPOSITORY_URL" && exit 1)
          test -n "${{ vars.CONSOLE_CLOUD_RUN_SERVICE_NAME }}" || (echo "Missing CONSOLE_CLOUD_RUN_SERVICE_NAME" && exit 1)
          # No env_vars or IAM flags below by design -- every runtime env var
          # (CONSOLE_PASSWORD, VAULT_API_TOKEN, VAULT_REGISTRY_WRITE_TOKEN,
          # VAULT_BASE_URL, NEXT_PUBLIC_TENANT_ID) and the public-invoker IAM
          # binding are already fully owned by Terraform (console.tf). Passing
          # `image` alone to gcloud run deploy / deploy-cloudrun leaves
          # everything else on the current revision untouched (verified
          # directly against a real deployment during Phase 8 BYOC testing).

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        env:
          IMAGE_URI: ${{ vars.CONSOLE_ARTIFACT_REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: docker build --tag "${IMAGE_URI}" .

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ vars.CONSOLE_ARTIFACT_REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore

      - name: Push image
        env:
          IMAGE_URI: ${{ vars.CONSOLE_ARTIFACT_REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: docker push "${IMAGE_URI}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CONSOLE_CLOUD_RUN_SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ vars.CONSOLE_ARTIFACT_REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-prod:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify deployment variables
        run: |
          test -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" || (echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER" && exit 1)
          test -n "${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}" || (echo "Missing GCP_DEPLOY_SERVICE_ACCOUNT" && exit 1)
          test -n "${{ vars.CONSOLE_ARTIFACT_REPOSITORY_URL }}" || (echo "Missing CONSOLE_ARTIFACT_REPOSITORY_URL" && exit 1)
          test -n "${{ vars.CONSOLE_CLOUD_RUN_SERVICE_NAME }}" || (echo "Missing CONSOLE_CLOUD_RUN_SERVICE_NAME" && exit 1)

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        env:
          IMAGE_URI: ${{ vars.CONSOLE_ARTIFACT_REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: docker build --tag "${IMAGE_URI}" .

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ vars.CONSOLE_ARTIFACT_REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore

      - name: Push image
        env:
          IMAGE_URI: ${{ vars.CONSOLE_ARTIFACT_REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: docker push "${IMAGE_URI}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CONSOLE_CLOUD_RUN_SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ vars.CONSOLE_ARTIFACT_REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
